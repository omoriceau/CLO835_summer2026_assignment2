name: Build and Push Docker Image

on:
  push:
    branches:
      - master
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read application version
        id: version
        run: |
          VERSION=$(grep '^VERSION' apps/python/app.py | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Detected version: $VERSION"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/clo835-a2:${{ env.APP_VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/clo835-a2:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/clo835-a2:latest
